<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C. Gimeno | Ilustrador</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * { font-family: 'Inter', sans-serif !important; }

        :root {
            --bg: #f0f0f0;
            --text: #000000;
            --accent: #ff4d00;
            --card-bg: #1a1a1a;
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --text: #ffffff;
            --card-bg: #111111;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            background-color: var(--bg); color: var(--text);
            overflow-x: hidden; transition: background-color 0.4s ease;
        }

        /* CURSOR */
        .cursor-dot, .cursor-outline {
            position: fixed; pointer-events: none; z-index: 99999; 
            border-radius: 50%; transform: translate(-50%, -50%);
        }
        @media (min-width: 1024px) {
            * { cursor: none !important; }
            .cursor-dot { width: 8px; height: 8px; background: var(--accent); }
            .cursor-outline { width: 40px; height: 40px; border: 2px solid var(--text); transition: all 0.1s ease-out; }
        }

        /* LOGO */
        .logo { 
            position: absolute; top: 40px; left: 40px; width: 65px; z-index: 20;
            animation: flotar 4s ease-in-out infinite;
        }
        @keyframes flotar {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }

        .main-container { display: flex; width: 100%; height: 100vh; overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth; }
        section { flex-shrink: 0; height: 100%; display: flex; align-items: center; position: relative; width: 100vw; }

        .hero { width: 85vw; padding: 5vw; }
        h1 { font-size: 10vw; line-height: 0.85; margin: 0; font-weight: 900; text-transform: uppercase; letter-spacing: -4px; }
        
        /* PORTFOLIO */
        .portfolio-brutal { display: flex; gap: 80px; padding: 0 5vw; align-items: center; width: auto; position: relative; }
        
        .curved-text-container {
            position: absolute; top: 2%; left: 2vw; width: 500px; height: 150px; z-index: 10; pointer-events: none;
        }
        .curved-text-container svg { width: 100%; height: 100%; overflow: visible; }
        .curved-text-container text { fill: var(--accent); font-weight: 900; font-size: 42px; text-transform: uppercase; letter-spacing: -1px; }

        .bg-text { position: absolute; font-size: 20vw; font-weight: 900; color: var(--card-bg); z-index: -1; white-space: nowrap; left: 2vw; opacity: 0.15; }

        .port-item { position: relative; height: 65vh; transition: 0.4s; opacity: 0; transform: translateY(50px); }
        .port-item.visible { opacity: 1; transform: translateY(0); }

        .scratch-container { position: relative; height: 100%; border-radius: 4px; overflow: hidden; background-color: var(--accent); }
        .scratch-container img { height: 100%; width: auto; display: block; }
        .scratch-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }

        /* CONTACTO ACTUALIZADO */
        .contact-section { width: 100vw; background: var(--accent); color: #fff; flex-direction: column; justify-content: center; text-align: center; display: flex; }
        .contact-title { font-size: 8vw; font-weight: 900; line-height: 0.8; margin-bottom: 40px; }
        .whatsapp-btn { background: #fff; color: var(--accent); font-size: 1.5rem; padding: 25px 60px; border-radius: 100px; text-decoration: none; font-weight: 900; margin-bottom: 20px; transition: 0.3s; }
        .whatsapp-btn:hover { transform: scale(1.05); }
        
        .email-link { 
            color: #ffffff; 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 1.2rem; 
            letter-spacing: 1px;
            opacity: 0.9;
            transition: 0.3s;
        }
        .email-link:hover { opacity: 1; text-decoration: underline; }

        /* OTROS */
        .theme-switch { position: fixed; bottom: 30px; left: 30px; z-index: 10005; background: var(--text); color: var(--bg); padding: 8px 15px; border-radius: 50px; font-weight: 900; font-size: 0.7rem; cursor: pointer; }
        .sticker { position: fixed; top: 15%; right: 5%; width: 110px; z-index: 10001; cursor: grab; transform: rotate(-10deg); }
        .btn { padding: 18px 35px; border-radius: 50px; font-weight: 900; text-decoration: none; text-transform: uppercase; font-size: 0.8rem; display: inline-block; }
        .btn-black { background: var(--text); color: var(--bg); }
        .btn-orange { background: var(--accent); color: #fff; }

        @media (max-width: 768px) {
            .main-container { display: block; height: auto; }
            section { width: 100%; height: auto; padding: 100px 20px; flex-direction: column; }
            .curved-text-container { position: relative; left: 0; width: 100%; height: 80px; margin-bottom: 20px; }
            .curved-text-container text { font-size: 30px; }
            h1 { font-size: 16vw; text-align: center; }
            .scratch-canvas { display: none; }
            .whatsapp-btn { font-size: 1.2rem; padding: 20px 40px; }
            .email-link { font-size: 0.9rem; }
        }
    </style>
</head>
<body data-theme="light">

    <div class="progress-bar" id="bar" style="position: fixed; top: 0; left: 0; height: 6px; background: var(--accent); z-index: 10002;"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div class="theme-switch" onclick="toggleTheme()">
        <span id="theme-text">MODO OSCURO</span>
    </div>

    <div id="sticker" class="sticker">
        <img src="./img/sticker-final.webp" alt="Sticker">
        <div id="distance-meter" style="font-size: 9px; text-align: center; font-weight: 900; color: var(--text); background: rgba(255,255,255,0.8); border-radius: 5px; margin-top: 5px;">0 PX</div>
    </div>

    <div class="main-container" id="scroll-container">
        <section class="hero">
            <img src="./img/tu-logo.webp" alt="Logo" class="logo">
            <h1 id="hero-name">CARLOS<br>GIMENO</h1>
            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <a href="https://wa.me/34670898357" target="_blank" class="btn btn-black">WhatsApp</a>
                <a href="javascript:void(0)" class="btn btn-orange" onclick="goToContact()">¿Saber más?</a>
            </div>
        </section>

        <section class="portfolio-brutal">
            <div class="curved-text-container">
                <svg viewBox="0 0 500 200">
                    <path id="curve" d="M 50,150 A 200,80 0 0,1 450,150" fill="transparent" />
                    <text>
                        <textPath xlink:href="#curve" startOffset="50%" text-anchor="middle">
                            ¡RASCA Y DESCUBRE!
                        </textPath>
                    </text>
                </svg>
            </div>
            <div class="bg-text">RECENT WORK</div>
            <div class="port-item"><div class="scratch-container"><img src="./img/ilustracion-1.webp" alt="1"><canvas class="scratch-canvas"></canvas></div></div>
            <div class="port-item"><div class="scratch-container"><img src="./img/ilustracion-2.webp" alt="2"><canvas class="scratch-canvas"></canvas></div></div>
            <div class="port-item"><div class="scratch-container"><img src="./img/ilustracion-3.webp" alt="3"><canvas class="scratch-canvas"></canvas></div></div>
        </section>

        <section class="contact-section" id="contact-target">
            <div class="contact-title">¿QUIERES<br>SABER MÁS?</div>
            <a href="https://wa.me/34670898357" target="_blank" class="whatsapp-btn">DAME CAÑA</a>
            <a href="mailto:carlosgimenosanchez@gmail.com" class="email-link">carlosgimenosanchez@gmail.com</a>
        </section>
    </div>

    <script>
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        
        window.addEventListener('mousemove', (e) => {
            requestAnimationFrame(() => {
                if (dot) {
                    dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
                    outline.style.left = e.clientX + 'px'; outline.style.top = e.clientY + 'px';
                }
            });
        });

        function toggleTheme() {
            const body = document.body;
            const text = document.getElementById('theme-text');
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            text.innerText = isDark ? "MODO OSCURO" : "MODO CLARO";
        }

        const container = document.getElementById('scroll-container');
        const bar = document.getElementById('bar');
        const updateProgress = () => {
            let pct = (window.innerWidth > 768) 
                ? (container.scrollLeft / (container.scrollWidth - container.clientWidth)) * 100
                : (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            bar.style.width = pct + "%";
        };
        container.addEventListener('scroll', updateProgress);
        window.addEventListener('scroll', updateProgress);
        window.addEventListener('wheel', (e) => {
            if (window.innerWidth > 768 && e.deltaY !== 0) {
                e.preventDefault(); container.scrollLeft += (e.deltaY * 2.5);
            }
        }, { passive: false });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.port-item').forEach(item => observer.observe(item));

        const sticker = document.getElementById('sticker');
        const distanceDisplay = document.getElementById('distance-meter');
        let isDragging = false, totalDist = 0, lastX, lastY, ox, oy;
        
        sticker.addEventListener('mousedown', (e) => {
            isDragging = true; ox = e.clientX - sticker.offsetLeft; oy = e.clientY - sticker.offsetTop;
            lastX = e.clientX; lastY = e.clientY;
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            totalDist += Math.sqrt(Math.pow(e.clientX - lastX, 2) + Math.pow(e.clientY - lastY, 2));
            distanceDisplay.innerText = Math.floor(totalDist) + " PX";
            sticker.style.left = (e.clientX - ox) + 'px'; sticker.style.top = (e.clientY - oy) + 'px';
            lastX = e.clientX; lastY = e.clientY;
        });
        window.addEventListener('mouseup', () => isDragging = false);

        const canvases = document.querySelectorAll('.scratch-canvas');
        canvases.forEach(canvas => {
            const ctx = canvas.getContext('2d');
            const img = canvas.previousElementSibling;
            const init = () => {
                canvas.width = img.offsetWidth;
                canvas.height = img.offsetHeight;
                ctx.fillStyle = '#ff4d00';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 120;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
            };
            if (img.complete) init(); else img.onload = init;
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                ctx.beginPath();
                ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.stroke();
            });
        });

        function goToContact() {
            if (window.innerWidth > 768) container.scrollTo({ left: container.scrollWidth, behavior: 'smooth' });
            else document.getElementById('contact-target').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
