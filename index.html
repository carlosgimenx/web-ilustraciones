<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C. Gimeno | Ilustrador</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * { font-family: 'Inter', sans-serif !important; box-sizing: border-box; }

        :root {
            --bg: #f0f0f0;
            --text: #000000;
            --accent: #ff4d00;
            --card-bg: #1a1a1a;
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --text: #ffffff;
            --card-bg: #111111;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); color: var(--text);
            overflow-x: hidden; transition: background-color 0.4s ease;
        }

        /* LOGO FLOTANTE */
        .logo { 
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 65px; z-index: 20;
            animation: flotar 4s ease-in-out infinite;
        }
        @keyframes flotar {
            0%, 100% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
            50% { transform: translateX(-50%) translateY(-15px) rotate(3deg); }
        }

        .main-container { display: flex; width: 100%; height: 100vh; overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth; }
        section { flex-shrink: 0; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; width: 100vw; text-align: center; }

        /* HERO CON PARALLAX */
        .hero { padding: 0; perspective: 1000px; }
        h1 { 
            font-size: 10vw; line-height: 0.85; margin: 0; font-weight: 900; 
            text-transform: uppercase; letter-spacing: -4px; width: 100%;
            transition: transform 0.1s ease-out; /* Para que el parallax sea fluido */
            will-change: transform;
        }
        
        /* PORTFOLIO */
        .portfolio-brutal { flex-direction: row; width: auto; gap: 80px; padding: 0 5vw; }
        .curved-text-container { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); width: 500px; height: 150px; z-index: 10; pointer-events: none; }
        .curved-text-container text { fill: var(--accent); font-weight: 900; font-size: 42px; text-transform: uppercase; }

        .port-item { position: relative; height: 65vh; transition: 0.4s; opacity: 0; transform: translateY(50px); }
        .port-item.visible { opacity: 1; transform: translateY(0); }
        .scratch-container { position: relative; height: 100%; border-radius: 4px; overflow: hidden; background-color: var(--accent); }
        .scratch-container img { height: 100%; width: auto; display: block; }
        .scratch-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }

        /* CONTACTO */
        .contact-section { background: var(--accent); color: #fff; padding: 40px; }
        .contact-title { font-size: 8vw; font-weight: 900; line-height: 0.8; margin-bottom: 40px; }
        .whatsapp-btn { background: #fff; color: var(--accent); font-size: 1.5rem; padding: 25px 60px; border-radius: 100px; text-decoration: none; font-weight: 900; margin-bottom: 20px; display: inline-block; transition: transform 0.3s; }
        .whatsapp-btn:hover { transform: scale(1.05); }
        .email-link { color: #ffffff; text-decoration: none; font-weight: 900; font-size: 1.2rem; letter-spacing: 1px; }

        /* OTROS */
        .theme-switch { position: fixed; bottom: 30px; left: 30px; z-index: 10005; background: var(--text); color: var(--bg); padding: 8px 15px; border-radius: 50px; font-weight: 900; font-size: 0.7rem; cursor: pointer; }
        .sticker { position: fixed; top: 15%; right: 5%; width: 110px; z-index: 10001; cursor: grab; transform: rotate(-10deg); }

        @media (max-width: 768px) {
            .main-container { display: block; height: auto; }
            section { width: 100%; height: auto; min-height: 100vh; padding: 80px 20px; }
            .curved-text-container { display: none; }
            h1 { font-size: 18vw; transform: none !important; } /* Desactivamos parallax en móvil */
            .contact-title { font-size: 15vw; }
            .scratch-canvas { display: none; }
        }
    </style>
</head>
<body data-theme="light">

    <div id="bar" style="position: fixed; top: 0; left: 0; height: 6px; background: var(--accent); z-index: 10002; width: 0%;"></div>

    <div class="theme-switch" onclick="toggleTheme()">
        <span id="theme-text">MODO OSCURO</span>
    </div>

    <div id="sticker" class="sticker">
        <img src="./img/sticker-final.webp" alt="Sticker" style="width:100%">
        <div id="distance-meter" style="font-size: 9px; text-align: center; font-weight: 900; background: rgba(255,255,255,0.8); border-radius: 5px; color: #000;">0 PX</div>
    </div>

    <div class="main-container" id="scroll-container">
        <section class="hero">
            <img src="./img/tu-logo.webp" alt="Logo" class="logo">
            <h1 id="hero-name">CARLOS<br>GIMENO</h1>
            <div style="display: flex; gap: 15px; margin-top: 30px; justify-content: center; width: 100%;">
                <a href="https://wa.me/34670898357" target="_blank" style="padding: 15px 30px; border-radius: 50px; font-weight: 900; text-decoration: none; background: var(--text); color: var(--bg); font-size: 0.8rem;">WhatsApp</a>
                <a href="javascript:void(0)" onclick="goToContact()" style="padding: 15px 30px; border-radius: 50px; font-weight: 900; text-decoration: none; background: var(--accent); color: #fff; font-size: 0.8rem;">¿Saber más?</a>
            </div>
        </section>

        <section class="portfolio-brutal">
            <div class="curved-text-container">
                <svg viewBox="0 0 500 200"><path id="curve" d="M 50,150 A 200,80 0 0,1 450,150" fill="transparent" /><text><textPath xlink:href="#curve" startOffset="50%" text-anchor="middle">¡RASCA Y DESCUBRE!</textPath></text></svg>
            </div>
            <div class="port-item"><div class="scratch-container"><img src="./img/ilustracion-1.webp" alt="1"><canvas class="scratch-canvas"></canvas></div></div>
            <div class="port-item"><div class="scratch-container"><img src="./img/ilustracion-2.webp" alt="2"><canvas class="scratch-canvas"></canvas></div></div>
            <div class="port-item"><div class="scratch-container"><img src="./img/ilustracion-3.webp" alt="3"><canvas class="scratch-canvas"></canvas></div></div>
        </section>

        <section class="contact-section" id="contact-target">
            <div class="contact-title">¿QUIERES<br>SABER MÁS?</div>
            <a href="https://wa.me/34670898357" target="_blank" class="whatsapp-btn">DAME CAÑA</a>
            <a href="mailto:carlosgimenosanchez@gmail.com" class="email-link">carlosgimenosanchez@gmail.com</a>
        </section>
    </div>

    <script>
        // EFECTO PARALLAX RECUPERADO
        const heroName = document.getElementById('hero-name');
        window.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const x = (window.innerWidth / 2 - e.clientX) / 25;
                const y = (window.innerHeight / 2 - e.clientY) / 25;
                heroName.style.transform = `translate(${x}px, ${y}px)`;
            }
        });

        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-text').innerText = isDark ? "MODO OSCURO" : "MODO CLARO";
        }

        const container = document.getElementById('scroll-container');
        const bar = document.getElementById('bar');
        
        container.addEventListener('scroll', () => {
            let pct = (container.scrollLeft / (container.scrollWidth - container.clientWidth)) * 100;
            bar.style.width = pct + "%";
        });

        window.addEventListener('wheel', (e) => {
            if (window.innerWidth > 768 && e.deltaY !== 0) {
                e.preventDefault(); container.scrollLeft += (e.deltaY * 2);
            }
        }, { passive: false });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.port-item').forEach(item => observer.observe(item));

        // STICKER DRAG
        const sticker = document.getElementById('sticker');
        let isDragging = false, totalDist = 0, lastX, lastY, ox, oy;
        sticker.addEventListener('mousedown', (e) => { isDragging = true; ox = e.clientX - sticker.offsetLeft; oy = e.clientY - sticker.offsetTop; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            totalDist += Math.sqrt(Math.pow(e.clientX - lastX, 2) + Math.pow(e.clientY - lastY, 2));
            document.getElementById('distance-meter').innerText = Math.floor(totalDist) + " PX";
            sticker.style.left = (e.clientX - ox) + 'px'; sticker.style.top = (e.clientY - oy) + 'px';
            lastX = e.clientX; lastY = e.clientY;
        });
        window.addEventListener('mouseup', () => isDragging = false);

        // CANVAS
        const canvases = document.querySelectorAll('.scratch-canvas');
        canvases.forEach(canvas => {
            const ctx = canvas.getContext('2d');
            const img = canvas.previousElementSibling;
            const init = () => {
                canvas.width = img.offsetWidth; canvas.height = img.offsetHeight;
                ctx.fillStyle = '#ff4d00'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 100; ctx.lineCap = 'round';
            };
            if (img.complete) init(); else img.onload = init;
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top); ctx.stroke();
            });
        });

        function goToContact() {
            if (window.innerWidth > 768) container.scrollTo({ left: container.scrollWidth, behavior: 'smooth' });
            else document.getElementById('contact-target').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
