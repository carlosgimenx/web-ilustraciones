<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C. Gimeno | Ilustrador</title>
    <style>
        /* 1. BASE */
        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            font-family: 'Inter', sans-serif; background-color: #fff; /* Fondo blanco para pintar */
            overflow-x: hidden;
        }

        /* 2. EL LIENZO DE FONDO */
        #bg-canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; /* Detrás del contenido, delante del fondo */
            pointer-events: none; /* Permite hacer click en botones debajo */
        }

        /* 3. CURSOR ESPECIAL (Inversión de color) */
        .cursor-brush {
            width: 40px; height: 40px;
            background: #000;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10005;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference; /* Aquí ocurre la magia con el texto */
        }

        /* 4. CONTENIDO (Z-index superior para que el texto sea legible) */
        .main-container {
            position: relative; z-index: 10;
            display: flex; width: 100%; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
        }

        /* Forzamos el texto a ser negro para que el mix-blend-mode lo invierta a blanco */
        h1, .contact-title, .bg-text {
            color: #000;
            mix-blend-mode: multiply; /* Mantiene el texto visible sobre el trazo */
        }

        /* 5. PORTFOLIO Y SECCIONES */
        section { flex-shrink: 0; height: 100%; display: flex; align-items: center; width: 100vw; position: relative; }
        
        .hero { width: 85vw; padding: 5vw; }
        h1 { font-size: 10vw; font-weight: 900; line-height: 0.85; margin: 0; text-transform: uppercase; letter-spacing: -4px; }

        .portfolio-brutal { display: flex; gap: 80px; padding: 0 5vw; align-items: center; width: auto; }
        .port-item { position: relative; height: 60vh; z-index: 20; }
        .scratch-container { position: relative; height: 100%; border-radius: 4px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); overflow: hidden; background: #000; }
        .scratch-container img { height: 100%; width: auto; display: block; }
        .scratch-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .contact-section { width: 100vw; background: #ff4d00; color: #fff; flex-direction: column; justify-content: center; text-align: center; }
        /* El fondo naranja de contacto debe tapar el dibujo para legibilidad */
        .contact-section { z-index: 30; } 

        .whatsapp-btn { background: #000; color: #fff; padding: 20px 50px; border-radius: 100px; text-decoration: none; font-weight: 900; font-size: 1.2rem; }

        /* STICKER */
        .sticker { position: fixed; top: 15%; right: 5%; width: 110px; z-index: 10001; cursor: grab; transform: rotate(-10deg); }
        .sticker img { width: 100%; height: auto; }

        @media (max-width: 768px) {
            .main-container { display: block; height: auto; }
            section { width: 100%; height: auto; padding: 60px 20px; flex-direction: column; align-items: center; }
            .hero { min-height: 50vh; text-align: center; padding-top: 100px; }
            h1 { font-size: 18vw; }
            .portfolio-brutal { flex-direction: column; gap: 40px; }
            .port-item { width: 100%; height: auto; }
            .port-item img { width: 100%; height: auto; }
            .scratch-canvas { display: none; }
            .sticker { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="cursor-brush"></div>

    <div id="sticker" class="sticker">
        <img src="./img/sticker-final.webp" alt="Sticker">
    </div>

    <div class="main-container" id="scroll-container">
        
        <section class="hero">
            <h1>CARLOS<br>GIMENO</h1>
            <div style="margin-top: 30px;">
                <a href="https://wa.me/34670898357" class="whatsapp-btn">WHATSAPP</a>
            </div>
        </section>

        <section class="portfolio-brutal">
            <div class="port-item">
                <div class="scratch-container">
                    <img src="./img/ilustracion-1.webp" alt="1">
                    <canvas class="scratch-canvas"></canvas>
                </div>
            </div>
            <div class="port-item">
                <div class="scratch-container">
                    <img src="./img/ilustracion-2.webp" alt="2">
                    <canvas class="scratch-canvas"></canvas>
                </div>
            </div>
        </section>

        <section class="contact-section" id="contact-target">
            <div class="contact-title" style="color: #fff; mix-blend-mode: normal;">¿QUIERES SABER MÁS?</div>
            <a href="https://wa.me/34670898357" class="whatsapp-btn" style="background: #fff; color: #ff4d00;">DAME CAÑA</a>
        </section>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const brush = document.querySelector('.cursor-brush');
        
        // Ajustar canvas al tamaño de ventana
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 40;
            ctx.strokeStyle = '#000';
        }
        window.addEventListener('resize', resize);
        resize();

        // Lógica de pintado de fondo
        let lastX, lastY;
        window.addEventListener('mousemove', (e) => {
            // Mover el cursor-pincel
            brush.style.left = e.clientX + 'px';
            brush.style.top = e.clientY + 'px';

            // Pintar en el canvas de fondo
            ctx.beginPath();
            ctx.moveTo(lastX || e.clientX, lastY || e.clientY);
            ctx.lineTo(e.clientX, e.clientY);
            ctx.stroke();
            [lastX, lastY] = [e.clientX, e.clientY];
        });

        // Portfolio Scratch Effect (el que ya teníamos)
        const sCanvases = document.querySelectorAll('.scratch-canvas');
        sCanvases.forEach(sc => {
            const sCtx = sc.getContext('2d');
            const img = sc.previousElementSibling;
            function init() {
                sc.width = img.offsetWidth; sc.height = img.offsetHeight;
                sCtx.filter = 'grayscale(100%) brightness(0.8)';
                sCtx.drawImage(img, 0, 0, sc.width, sc.height);
                sCtx.globalCompositeOperation = 'destination-out';
                sCtx.lineWidth = 150; sCtx.lineCap = 'round';
            }
            if (img.complete) init(); else img.onload = init;
            sc.addEventListener('mousemove', (e) => {
                const r = sc.getBoundingClientRect();
                sCtx.beginPath();
                sCtx.moveTo(e.clientX - r.left, e.clientY - r.top);
                sCtx.lineTo(e.clientX - r.left, e.clientY - r.top);
                sCtx.stroke();
            });
        });

        // Sticker Drag (el de siempre)
        const sticker = document.getElementById('sticker');
        let isDragging = false, ox, oy;
        sticker.addEventListener('mousedown', (e) => { isDragging = true; ox = e.clientX - sticker.offsetLeft; oy = e.clientY - sticker.offsetTop; });
        window.addEventListener('mousemove', (e) => { if (!isDragging) return; sticker.style.left = (e.clientX - ox) + 'px'; sticker.style.top = (e.clientY - oy) + 'px'; sticker.style.right = 'auto'; });
        window.addEventListener('mouseup', () => isDragging = false);

        // Scroll Horizontal PC
        const container = document.getElementById('scroll-container');
        window.addEventListener('wheel', (e) => {
            if (window.innerWidth > 768) {
                e.preventDefault();
                container.scrollLeft += e.deltaY * 2;
            }
        }, { passive: false });
    </script>
</body>
</html>
