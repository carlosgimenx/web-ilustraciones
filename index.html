<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C. Gimeno | Ilustrador</title>
    <style>
        /* 1. BASE Y LIMPIEZA */
        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            font-family: 'Inter', sans-serif; background-color: #fff;
            overflow-x: hidden;
        }

        /* 2. EL LIENZO DE FONDO (Interactivo) */
        #painting-canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 5; /* Por encima del fondo, por debajo del texto */
            pointer-events: none; /* Crucial para poder clickar botones */
        }

        /* 3. CURSOR "PINCEL" */
        .cursor-brush {
            width: 30px; height: 30px;
            background: #000;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10005;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference; /* Esto hace que brille sobre negro */
        }

        /* 4. CONTENIDO CON MEZCLA */
        .main-container {
            position: relative; z-index: 10;
            display: flex; width: 100%; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
        }

        h1, .bg-text, .contact-title {
            color: #000;
            /* Esta propiedad permite que el trazo del canvas "interacte" visualmente */
            mix-blend-mode: difference; 
        }

        section { flex-shrink: 0; height: 100%; display: flex; align-items: center; width: 100vw; position: relative; }
        
        /* 5. PORTFOLIO SCRATCH */
        .portfolio-brutal { display: flex; gap: 80px; padding: 0 5vw; align-items: center; }
        .port-item { position: relative; height: 60vh; z-index: 20; }
        .scratch-container { position: relative; height: 100%; border-radius: 4px; overflow: hidden; background: #000; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .scratch-container img { height: 100%; width: auto; display: block; }
        .scratch-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }

        /* 6. BOTÓN LIMPIAR (Para no saturar la web) */
        .clear-btn {
            position: fixed; bottom: 20px; left: 20px; z-index: 10006;
            background: #000; color: #fff; border: none; padding: 10px 15px;
            font-size: 0.7rem; font-weight: 900; cursor: pointer; border-radius: 5px;
        }

        /* MÓVIL */
        @media (max-width: 768px) {
            .main-container { display: block; height: auto; }
            section { width: 100%; height: auto; padding: 80px 20px; flex-direction: column; }
            h1 { font-size: 18vw; text-align: center; }
            .portfolio-brutal { flex-direction: column; }
            .port-item { width: 100%; height: auto; }
            .port-item img { width: 100%; height: auto; }
            .scratch-canvas { display: none; } /* Desactivado en móvil por rendimiento */
        }
    </style>
</head>
<body>

    <canvas id="painting-canvas"></canvas>
    <div class="cursor-brush"></div>
    <button class="clear-btn" onclick="clearCanvas()">LIMPIAR LIENZO</button>

    <div class="main-container" id="scroll-container">
        
        <section class="hero">
            <h1>CARLOS<br>GIMENO</h1>
        </section>

        <section class="portfolio-brutal">
            <div class="port-item">
                <div class="scratch-container">
                    <img src="./img/ilustracion-1.webp" alt="1">
                    <canvas class="scratch-canvas"></canvas>
                </div>
            </div>
            <div class="port-item">
                <div class="scratch-container">
                    <img src="./img/ilustracion-2.webp" alt="2">
                    <canvas class="scratch-canvas"></canvas>
                </div>
            </div>
        </section>

        <section class="contact-section" style="background:#ff4d00; width:100vw; height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <h2 class="contact-title" style="color:#fff; mix-blend-mode: normal; font-size: 8vw; font-weight:900;">¿DAME CAÑA?</h2>
            <a href="https://wa.me/34670898357" style="background:#000; color:#fff; padding:20px 40px; border-radius:50px; text-decoration:none; font-weight:900; margin-top:20px;">WHATSAPP</a>
        </section>
    </div>

    <script>
        const canvas = document.getElementById('painting-canvas');
        const ctx = canvas.getContext('2d');
        const brush = document.querySelector('.cursor-brush');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 35;
            ctx.strokeStyle = '#000';
        }
        window.addEventListener('resize', resize);
        resize();

        let lastX, lastY;

        // Pintar en el fondo
        window.addEventListener('mousemove', (e) => {
            brush.style.left = e.clientX + 'px';
            brush.style.top = e.clientY + 'px';

            ctx.beginPath();
            ctx.moveTo(lastX || e.clientX, lastY || e.clientY);
            ctx.lineTo(e.clientX, e.clientY);
            ctx.stroke();
            [lastX, lastY] = [e.clientX, e.clientY];
        });

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Efecto Scratch en Portfolio
        const sCanvases = document.querySelectorAll('.scratch-canvas');
        sCanvases.forEach(sc => {
            const sCtx = sc.getContext('2d');
            const img = sc.previousElementSibling;
            function init() {
                sc.width = img.offsetWidth; sc.height = img.offsetHeight;
                sCtx.filter = 'grayscale(100%) brightness(0.8)';
                sCtx.drawImage(img, 0, 0, sc.width, sc.height);
                sCtx.globalCompositeOperation = 'destination-out';
                sCtx.lineWidth = 100; sCtx.lineCap = 'round';
            }
            if (img.complete) init(); else img.onload = init;
            sc.addEventListener('mousemove', (e) => {
                const r = sc.getBoundingClientRect();
                sCtx.beginPath();
                sCtx.moveTo(e.clientX - r.left, e.clientY - r.top);
                sCtx.lineTo(e.clientX - r.left, e.clientY - r.top);
                sCtx.stroke();
            });
        });

        // Scroll horizontal suave en PC
        const container = document.getElementById('scroll-container');
        window.addEventListener('wheel', (e) => {
            if (window.innerWidth > 768) {
                e.preventDefault();
                container.scrollLeft += e.deltaY;
            }
        }, { passive: false });
    </script>
</body>
</html>
