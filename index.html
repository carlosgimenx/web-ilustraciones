<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C. Gimeno | Ilustrador</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f0f0f0;
            --text: #000000;
            --accent: #ff4d00;
            --card-bg: #e8e8e8;
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --text: #ffffff;
            --card-bg: #1a1a1a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); color: var(--text);
            overflow-x: hidden; transition: background-color 0.4s ease;
        }

        /* CURSOR PERSONALIZADO - FIX POSICIÓN */
        .cursor-dot, .cursor-outline {
            position: fixed;
            top: -100px; /* Empezar fuera de vista */
            left: -100px;
            pointer-events: none;
            z-index: 99999;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none; /* Oculto por defecto */
        }

        @media (min-width: 1024px) {
            * { cursor: none !important; }
            .cursor-dot { display: block; width: 8px; height: 8px; background: var(--accent); }
            .cursor-outline { display: block; width: 40px; height: 40px; border: 2px solid var(--text); transition: all 0.1s ease-out; }
        }

        .progress-bar {
            position: fixed; top: 0; left: 0; height: 6px;
            background: var(--accent); width: 0%; z-index: 10002;
            transition: width 0.1s ease-out;
        }

        .theme-switch {
            position: fixed; bottom: 30px; left: 30px; z-index: 10005;
            display: flex; align-items: center; gap: 10px;
            background: var(--text); color: var(--bg);
            padding: 8px 15px; border-radius: 50px; font-weight: 900;
            font-size: 0.7rem; cursor: pointer; text-transform: uppercase;
        }

        /* LOGO Y ANIMACIÓN FLOTANTE */
        .logo { 
            position: absolute; top: 40px; left: 40px; width: 65px; z-index: 20;
            animation: flotar 3s ease-in-out infinite;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }

        /* RESTO DE ESTILOS */
        .sticker { position: fixed; top: 15%; right: 5%; width: 110px; z-index: 10001; cursor: grab; transform: rotate(-10deg); user-select: none; }
        .sticker img { width: 100%; height: auto; pointer-events: none; }
        .sticker-label { background: #000; color: #fff; font-size: 0.5rem; padding: 3px 6px; font-weight: 900; text-align: center; }
        #distance-meter { font-size: 9px; margin-top: 5px; opacity: 0.7; color: var(--text); text-align: center; font-weight: bold; }

        .main-container { display: flex; width: 100%; height: 100vh; overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth; }
        section { flex-shrink: 0; height: 100%; display: flex; align-items: center; position: relative; width: 100vw; }

        .hero { width: 85vw; padding: 5vw; }
        h1 { font-size: 10vw; line-height: 0.85; margin: 0; font-weight: 900; text-transform: uppercase; letter-spacing: -4px; }
        
        .nav-buttons { display: flex; gap: 15px; margin-top: 30px; }
        .btn { padding: 18px 35px; border-radius: 50px; font-weight: 900; text-decoration: none; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; display: inline-block; z-index: 10; }
        .btn-black { background: var(--text); color: var(--bg); }
        .btn-orange { background: var(--accent); color: #fff; border: 2px solid var(--accent); }

        .portfolio-brutal { display: flex; gap: 80px; padding: 0 5vw; align-items: center; width: auto; }
        .bg-text { position: absolute; font-size: 20vw; font-weight: 900; color: var(--card-bg); z-index: -1; white-space: nowrap; pointer-events: none; left: 2vw; }

        .port-item { position: relative; height: 65vh; transition: transform 0.4s ease-out, opacity 0.6s ease-out; opacity: 0; transform: translateY(50px); }
        .port-item.visible { opacity: 1; transform: translateY(0); }

        .scratch-container { position: relative; height: 100%; border-radius: 4px; overflow: hidden; background-color: #000; }
        .scratch-container img { height: 100%; width: auto; display: block; }
        .scratch-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }

        .contact-section { width: 100vw; background: var(--accent); color: #fff; flex-direction: column; justify-content: center; text-align: center; }
        .contact-title { font-size: 8vw; font-weight: 900; line-height: 0.8; margin-bottom: 40px; text-transform: uppercase; }
        .whatsapp-btn { background: #fff; color: var(--accent); font-size: 1.5rem; padding: 25px 60px; border-radius: 100px; text-decoration: none; font-weight: 900; }

        @media (max-width: 768px) {
            .main-container { display: block; height: auto; }
            section { width: 100%; height: auto; padding: 100px 20px; flex-direction: column; }
            .logo { left: 50%; transform: translateX(-50%); animation: flotarMobile 3s ease-in-out infinite; }
            @keyframes flotarMobile { 0%, 100% { transform: translateX(-50%) translateY(0px); } 50% { transform: translateX(-50%) translateY(-10px); } }
            h1 { font-size: 16vw; text-align: center; }
            .port-item { opacity: 1; transform: none; width: 100%; height: auto; }
            .scratch-canvas { display: none; }
        }
    </style>
</head>
<body data-theme="light">

    <div class="progress-bar" id="bar"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div class="theme-switch" onclick="toggleTheme()">
        <span id="theme-text">MODO OSCURO</span>
    </div>

    <div id="sticker" class="sticker">
        <img src="./img/sticker-final.webp" alt="Sticker">
        <div class="sticker-label">MUEVE EL ARTE</div>
        <div id="distance-meter">0 PX</div>
    </div>

    <div class="main-container" id="scroll-container">
        <section class="hero">
            <img src="./img/tu-logo.webp" alt="Logo" class="logo">
            <h1 id="hero-name">CARLOS<br>GIMENO</h1>
            <div class="nav-buttons">
                <a href="https://wa.me/34670898357" target="_blank" class="btn btn-black">WhatsApp</a>
                <a href="javascript:void(0)" class="btn btn-orange" onclick="goToContact()">¿Saber más?</a>
            </div>
        </section>

        <section class="portfolio-brutal">
            <div class="bg-text">RECENT WORK</div>
            <div class="port-item"><div class="scratch-container"><img src="./img/ilustracion-1.webp" alt="1"><canvas class="scratch-canvas"></canvas></div></div>
            <div class="port-item"><div class="scratch-container"><img src="./img/ilustracion-2.webp" alt="2"><canvas class="scratch-canvas"></canvas></div></div>
            <div class="port-item"><div class="scratch-container"><img src="./img/ilustracion-3.webp" alt="3"><canvas class="scratch-canvas"></canvas></div></div>
        </section>

        <section class="contact-section" id="contact-target">
            <div class="contact-title">¿QUIERES<br>SABER MÁS?</div>
            <a href="https://wa.me/34670898357" target="_blank" class="whatsapp-btn">DAME CAÑA</a>
        </section>
    </div>

    <script>
        // --- 1. CURSOR (FIX MÁXIMO) ---
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');

        window.addEventListener('mousemove', (e) => {
            // Usamos requestAnimationFrame para que sea ultra fluido y no se bloquee
            requestAnimationFrame(() => {
                if (dot && outline) {
                    dot.style.left = `${e.clientX}px`;
                    dot.style.top = `${e.clientY}px`;
                    outline.style.left = `${e.clientX}px`;
                    outline.style.top = `${e.clientY}px`;
                }
            });
        });

        // --- 2. MODO OSCURO ---
        function toggleTheme() {
            const body = document.body;
            const text = document.getElementById('theme-text');
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            text.innerText = isDark ? "MODO OSCURO" : "MODO CLARO";
        }

        // --- 3. SCROLL Y PROGRESO ---
        const container = document.getElementById('scroll-container');
        const bar = document.getElementById('bar');

        const updateProgress = () => {
            let pct = 0;
            if (window.innerWidth > 768) {
                pct = (container.scrollLeft / (container.scrollWidth - container.clientWidth)) * 100;
            } else {
                pct = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            }
            bar.style.width = pct + "%";
        };

        container.addEventListener('scroll', updateProgress);
        window.addEventListener('scroll', updateProgress);

        // Scroll horizontal con rueda
        window.addEventListener('wheel', (e) => {
            if (window.innerWidth > 768 && e.deltaY !== 0) {
                e.preventDefault();
                container.scrollLeft += (e.deltaY * 2);
            }
        }, { passive: false });

        // --- 4. APARICIÓN PORTFOLIO ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.port-item').forEach(item => observer.observe(item));

        // --- 5. STICKER Y DISTANCIA ---
        const sticker = document.getElementById('sticker');
        const distanceDisplay = document.getElementById('distance-meter');
        let isDragging = false, totalDistance = 0, lastX = 0, lastY = 0, ox, oy;

        const startDrag = (e) => {
            isDragging = true;
            const c = e.touches ? e.touches[0] : e;
            ox = c.clientX - sticker.offsetLeft;
            oy = c.clientY - sticker.offsetTop;
            lastX = c.clientX; lastY = c.clientY;
        };

        const doDrag = (e) => {
            if (!isDragging) return;
            const c = e.touches ? e.touches[0] : e;
            
            totalDistance += Math.sqrt(Math.pow(c.clientX - lastX, 2) + Math.pow(c.clientY - lastY, 2));
            distanceDisplay.innerText = Math.floor(totalDistance) + " PX";
            
            sticker.style.left = (c.clientX - ox) + 'px';
            sticker.style.top = (c.clientY - oy) + 'px';
            lastX = c.clientX; lastY = c.clientY;
        };

        sticker.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('mouseup', () => isDragging = false);

        // --- 6. CANVAS SCRATCH ---
        const canvases = document.querySelectorAll('.scratch-canvas');
        canvases.forEach(canvas => {
            const ctx = canvas.getContext('2d');
            const img = canvas.previousElementSibling;
            
            const init = () => {
                canvas.width = img.offsetWidth;
                canvas.height = img.offsetHeight;
                ctx.fillStyle = '#333';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 100; ctx.lineCap = 'round';
            };

            if (img.complete) init(); else img.onload = init;

            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                ctx.beginPath();
                ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.stroke();
            });
        });

        function goToContact() {
            const target = document.getElementById('contact-target');
            if (window.innerWidth > 768) container.scrollTo({ left: container.scrollWidth, behavior: 'smooth' });
            else target.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
