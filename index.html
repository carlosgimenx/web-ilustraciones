<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C. Gimeno | Portfolio v0.4</title>
    <style>
        /* 1. BASE Y CONFIGURACIÓN */
        body, html {
            margin: 0; padding: 0; width: 100%;
            font-family: 'Inter', sans-serif; background-color: #f0f0f0; 
            overflow-x: hidden;
        }

        .progress-bar {
            position: fixed; top: 0; left: 0; height: 6px;
            background: #ff4d00; width: 0%; z-index: 10002;
            transition: width 0.1s ease-out;
        }

        @media (min-width: 1024px) {
            * { cursor: none !important; }
            .cursor-dot { width: 8px; height: 8px; background: #ff4d00; position: fixed; pointer-events: none; z-index: 10000; border-radius: 50%; transform: translate(-50%, -50%); }
            .cursor-outline { width: 40px; height: 40px; border: 2px solid #000; position: fixed; pointer-events: none; z-index: 9999; border-radius: 50%; transform: translate(-50%, -50%); transition: all 0.1s ease-out; }
        }

        /* 2. CONTENEDOR PRINCIPAL */
        .main-container {
            display: flex; width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth;
        }

        @media (max-width: 768px) {
            body, html { overflow-y: auto; }
            .main-container { display: block; height: auto; overflow-y: visible; overflow-x: hidden; }
        }

        section { flex-shrink: 0; height: 100%; display: flex; align-items: center; box-sizing: border-box; position: relative; }
        @media (max-width: 768px) {
            section { width: 100vw; height: auto; padding: 80px 20px; flex-direction: column; }
        }

        /* 3. HERO */
        .hero { width: 100vw; padding: 8vw; }
        .logo { position: absolute; top: 40px; left: 40px; width: 65px; }
        h1 { font-size: 10vw; line-height: 0.85; margin: 0; font-weight: 900; text-transform: uppercase; letter-spacing: -4px; }
        
        .nav-buttons { display: flex; gap: 15px; margin-top: 30px; }
        .btn { padding: 18px 35px; border-radius: 50px; font-weight: 900; text-decoration: none; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; display: inline-block; }
        .btn-black { background: #000; color: #fff; }
        .btn-orange { background: #ff4d00; color: #fff; border: 2px solid #ff4d00; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* 4. PORTFOLIO BRUTAL */
        .portfolio-brutal { display: flex; gap: 60px; padding: 0 150px; align-items: center; }
        .bg-text { position: absolute; font-size: 25vw; font-weight: 900; color: #e8e8e8; z-index: -1; white-space: nowrap; pointer-events: none; }

        .port-item { position: relative; height: 70vh; transition: 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .port-item img { height: 100%; width: auto; border-radius: 2px; box-shadow: 0 50px 100px rgba(0,0,0,0.15); }
        
        @media (min-width: 769px) {
            .port-item:nth-child(1) { transform: translateY(-15%); margin-right: -120px; z-index: 2; }
            .port-item:nth-child(2) { transform: translateY(10%); z-index: 1; }
            .port-item:nth-child(3) { transform: translateY(-5%); margin-left: -100px; z-index: 3; }
            .port-item:hover { z-index: 10; transform: scale(1.05) translateY(0); }
        }

        /* 5. SECCIÓN CONTACTO (¿QUIERES SABER MÁS?) */
        .contact-section { 
            width: 100vw; background: #ff4d00; color: #fff; 
            flex-direction: column; justify-content: center; text-align: center;
        }
        .contact-title { font-size: 8vw; font-weight: 900; line-height: 0.8; margin-bottom: 40px; text-transform: uppercase; }
        
        .whatsapp-btn {
            background: #fff; color: #ff4d00; font-size: 1.5rem; padding: 25px 60px;
            border-radius: 100px; text-decoration: none; font-weight: 900;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .whatsapp-btn:hover { background: #000; color: #fff; transform: translateY(-5px); }

        /* 6. STICKER */
        .sticker { position: fixed; top: 15%; right: 5%; width: 110px; z-index: 50; cursor: grab; transform: rotate(-10deg); }
        .sticker img { width: 100%; height: auto; }
        .sticker-label { background: #000; color: #fff; font-size: 0.5rem; padding: 3px 6px; font-weight: 900; text-align: center; }

        @media (max-width: 768px) {
            .portfolio-brutal { flex-direction: column; padding: 20px; gap: 60px; }
            .port-item { height: auto; width: 100%; transform: none !important; margin: 0 !important; }
            .port-item img { width: 100%; height: auto; }
            .contact-title { font-size: 15vw; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div class="progress-bar" id="bar"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div id="sticker" class="sticker">
        <img src="./img/sticker-final.webp" alt="Sticker">
        <div class="sticker-label">MUEVE EL ARTE</div>
    </div>

    <div class="main-container" id="scroll-container">
        
        <section class="hero">
            <img src="./img/tu-logo.webp" alt="Logo" class="logo">
            <h1>CARLOS<br>GIMENO</h1>
            <div class="nav-buttons">
                <a href="https://wa.me/34670898357" target="_blank" class="btn btn-black">WhatsApp Directo</a>
                <a href="javascript:void(0)" class="btn btn-orange" onclick="goToContact()">¿Quieres saber más?</a>
            </div>
        </section>

        <section class="portfolio-brutal">
            <div class="bg-text">ILUSTRACIÓN</div>
            <div class="port-item"><img src="./img/ilustracion-1.webp" alt="Obra 1"></div>
            <div class="port-item"><img src="./img/ilustracion-2.webp" alt="Obra 2"></div>
            <div class="port-item"><img src="./img/ilustracion-3.webp" alt="Obra 3"></div>
        </section>

        <section class="contact-section" id="contact-target">
            <div class="contact-title">¿QUIERES<br>SABER MÁS?</div>
            <p style="font-weight: 900; margin-bottom: 30px; letter-spacing: 2px;">DAME CAÑA POR WHATSAPP</p>
            <a href="https://wa.me/34670898357" target="_blank" class="whatsapp-btn">ESCRIBIR AHORA</a>
        </section>
    </div>

    <script>
        const container = document.getElementById('scroll-container');
        const bar = document.getElementById('bar');

        // BARRA PROGRESO
        container.addEventListener('scroll', () => {
            const max = container.scrollWidth - container.clientWidth;
            const pct = (container.scrollLeft / max) * 100;
            bar.style.width = pct + "%";
        });

        // NAVEGACIÓN A CONTACTO
        function goToContact() {
            if (window.innerWidth > 768) {
                container.scrollTo({ left: container.scrollWidth, behavior: 'smooth' });
            } else {
                document.getElementById('contact-target').scrollIntoView({ behavior: 'smooth' });
            }
        }

        // SCROLL HORIZONTAL PC
        window.addEventListener('wheel', (e) => {
            if (window.innerWidth > 768 && e.deltaY !== 0) {
                e.preventDefault();
                container.scrollLeft += (e.deltaY * 3);
            }
        }, { passive: false });

        // RATÓN CUSTOM
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        window.addEventListener('mousemove', (e) => {
            if (dot) {
                dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
                outline.style.left = e.clientX + 'px'; outline.style.top = e.clientY + 'px';
            }
        });

        // STICKER DRAG
        const sticker = document.getElementById('sticker');
        let isDragging = false, ox, oy;
        const start = (e) => { isDragging = true; const c = e.touches ? e.touches[0] : e; ox = c.clientX - sticker.offsetLeft; oy = c.clientY - sticker.offsetTop; };
        const move = (e) => { if (!isDragging) return; const c = e.touches ? e.touches[0] : e; sticker.style.left = (c.clientX - ox) + 'px'; sticker.style.top = (c.clientY - oy) + 'px'; };
        sticker.addEventListener('mousedown', start); sticker.addEventListener('touchstart', start);
        window.addEventListener('mousemove', move); window.addEventListener('touchmove', move);
        window.addEventListener('mouseup', () => isDragging = false); window.addEventListener('touchend', () => isDragging = false);
    </script>
</body>
</html>
