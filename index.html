<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C. Gimeno | Ilustrador</title>
    <style>
        /* 1. BASE */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif; background-color: #f0f0f0; 
            overflow: hidden;
        }

        .progress-bar {
            position: fixed; top: 0; left: 0; height: 6px;
            background: #ff4d00; width: 0%; z-index: 10002;
            transition: width 0.1s ease-out;
        }

        @media (min-width: 1024px) {
            * { cursor: none !important; }
            .cursor-dot { width: 8px; height: 8px; background: #ff4d00; position: fixed; pointer-events: none; z-index: 10000; border-radius: 50%; transform: translate(-50%, -50%); }
            .cursor-outline { width: 40px; height: 40px; border: 2px solid #000; position: fixed; pointer-events: none; z-index: 9999; border-radius: 50%; transform: translate(-50%, -50%); transition: all 0.1s ease-out; }
        }

        /* 2. STICKER FIJO */
        .sticker { 
            position: fixed; top: 15%; right: 5%; width: 110px; z-index: 10001;
            cursor: grab; transform: rotate(-10deg); user-select: none;
        }
        .sticker img { width: 100%; height: auto; pointer-events: none; }
        .sticker-label { background: #000; color: #fff; font-size: 0.5rem; padding: 3px 6px; font-weight: 900; text-align: center; }

        /* 3. CONTENEDOR */
        .main-container {
            display: flex; width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth;
        }

        section { flex-shrink: 0; height: 100%; display: flex; align-items: center; position: relative; }

        /* 4. HERO */
        .hero { width: 100vw; padding: 8vw; }
        .logo { position: absolute; top: 40px; left: 40px; width: 65px; }
        h1 { font-size: 10vw; line-height: 0.85; margin: 0; font-weight: 900; text-transform: uppercase; letter-spacing: -4px; }
        
        .nav-buttons { display: flex; gap: 15px; margin-top: 30px; }
        .btn { padding: 18px 35px; border-radius: 50px; font-weight: 900; text-decoration: none; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; display: inline-block; }
        .btn-black { background: #000; color: #fff; }
        .btn-orange { background: #ff4d00; color: #fff; border: 2px solid #ff4d00; }

        /* 5. PORTFOLIO SCRATCH-OFF (CAOS CONTROLADO) */
        .portfolio-brutal { display: flex; gap: 120px; padding: 0 15vw; align-items: center; }
        .bg-text { position: absolute; font-size: 20vw; font-weight: 900; color: #e8e8e8; z-index: -1; white-space: nowrap; pointer-events: none; left: 5vw; }

        .port-item { 
            position: relative; 
            height: 65vh; 
            transition: transform 0.4s ease-out;
        }
        
        @media (min-width: 769px) {
            .port-item:nth-child(1) { transform: translateY(-10%) rotate(-3deg); }
            .port-item:nth-child(2) { transform: translateY(15%) rotate(2deg); }
            .port-item:nth-child(3) { transform: translateY(-5%) rotate(-1deg); }
            .port-item:hover { transform: translateY(0) scale(1.05) rotate(0); z-index: 5; }
        }

        /* Contenedor del lienzo */
        .scratch-container {
            position: relative;
            height: 100%;
            aspect-ratio: auto;
            border-radius: 4px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            overflow: hidden;
            background-color: #000;
        }

        .scratch-container img {
            height: 100%;
            width: auto;
            display: block;
        }

        /* El canvas que contiene la imagen en B/N y se va borrando */
        .scratch-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            cursor: crosshair;
        }

        /* 6. CONTACTO */
        .contact-section { width: 100vw; background: #ff4d00; color: #fff; flex-direction: column; justify-content: center; text-align: center; }
        .contact-title { font-size: 8vw; font-weight: 900; line-height: 0.8; margin-bottom: 40px; text-transform: uppercase; }
        .whatsapp-btn { background: #fff; color: #ff4d00; font-size: 1.5rem; padding: 25px 60px; border-radius: 100px; text-decoration: none; font-weight: 900; transition: 0.3s; }

        @media (max-width: 768px) {
            body, html { overflow-y: auto; }
            .main-container { display: block; height: auto; }
            section { width: 100vw; height: auto; padding: 80px 20px; flex-direction: column; }
            .portfolio-brutal { flex-direction: column; gap: 60px; }
            .port-item { height: auto; width: 100%; transform: none !important; }
            .scratch-container img { width: 100%; height: auto; }
            .scratch-canvas { display: none; } /* En móvil mejor mostrar color directo */
            .contact-title { font-size: 15vw; }
        }
    </style>
</head>
<body>

    <div class="progress-bar" id="bar"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div id="sticker" class="sticker">
        <img src="./img/sticker-final.webp" alt="Sticker">
        <div class="sticker-label">MUEVE EL ARTE</div>
    </div>

    <div class="main-container" id="scroll-container">
        
        <section class="hero">
            <img src="./img/tu-logo.webp" alt="Logo" class="logo">
            <h1>CARLOS<br>GIMENO</h1>
            <div class="nav-buttons">
                <a href="https://wa.me/34670898357" target="_blank" class="btn btn-black">WhatsApp</a>
                <a href="javascript:void(0)" class="btn btn-orange" onclick="goToContact()">¿Saber más?</a>
            </div>
        </section>

        <section class="portfolio-brutal">
            <div class="bg-text">RECENT WORK</div>
            
            <div class="port-item">
                <div class="scratch-container">
                    <img src="./img/ilustracion-1.webp" alt="Obra 1">
                    <canvas class="scratch-canvas"></canvas>
                </div>
            </div>
            
            <div class="port-item">
                <div class="scratch-container">
                    <img src="./img/ilustracion-2.webp" alt="Obra 2">
                    <canvas class="scratch-canvas"></canvas>
                </div>
            </div>
            
            <div class="port-item">
                <div class="scratch-container">
                    <img src="./img/ilustracion-3.webp" alt="Obra 3">
                    <canvas class="scratch-canvas"></canvas>
                </div>
            </div>
        </section>

        <section class="contact-section" id="contact-target">
            <div class="contact-title">¿QUIERES<br>SABER MÁS?</div>
            <a href="https://wa.me/34670898357" target="_blank" class="whatsapp-btn">DAME CAÑA</a>
        </section>
    </div>

    <script>
        const container = document.getElementById('scroll-container');
        const bar = document.getElementById('bar');

        // SCROLL Y BARRA
        container.addEventListener('scroll', () => {
            const pct = (container.scrollLeft / (container.scrollWidth - container.clientWidth)) * 100;
            bar.style.width = pct + "%";
        });

        function goToContact() {
            const target = document.getElementById('contact-target');
            if (window.innerWidth > 768) container.scrollTo({ left: container.scrollWidth, behavior: 'smooth' });
            else target.scrollIntoView({ behavior: 'smooth' });
        }

        window.addEventListener('wheel', (e) => {
            if (window.innerWidth > 768 && e.deltaY !== 0) {
                e.preventDefault();
                container.scrollLeft += (e.deltaY * 3);
            }
        }, { passive: false });

        // LÓGICA DEL PINCEL PERMANENTE (CANVAS)
        const canvases = document.querySelectorAll('.scratch-canvas');
        
        canvases.forEach(canvas => {
            const ctx = canvas.getContext('2d');
            const img = canvas.previousElementSibling;

            function initCanvas() {
                canvas.width = img.offsetWidth;
                canvas.height = img.offsetHeight;
                
                // Dibujamos la versión B/N en el canvas
                ctx.filter = 'grayscale(100%) brightness(0.9)';
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // Configuramos el modo "borrador"
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 60; // Tamaño del pincel
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
            }

            // Esperar a que la imagen cargue para tomar sus medidas
            if (img.complete) initCanvas();
            else img.onload = initCanvas;

            // Dibujar al mover el ratón
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                ctx.beginPath();
                ctx.arc(x, y, 30, 0, Math.PI * 2);
                ctx.fill();
            });
        });

        // RATÓN CUSTOM
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        window.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
                outline.style.left = e.clientX + 'px'; outline.style.top = e.clientY + 'px';
            }
        });

        // STICKER DRAG
        const sticker = document.getElementById('sticker');
        let isDragging = false, ox, oy;
        const start = (e) => { isDragging = true; const c = e.touches ? e.touches[0] : e; ox = c.clientX - sticker.offsetLeft; oy = c.clientY - sticker.offsetTop; };
        const move = (e) => { if (!isDragging) return; e.preventDefault(); const c = e.touches ? e.touches[0] : e; sticker.style.left = (c.clientX - ox) + 'px'; sticker.style.top = (c.clientY - oy) + 'px'; sticker.style.right = 'auto'; };
        sticker.addEventListener('mousedown', start); sticker.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mousemove', move); window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('mouseup', () => isDragging = false); window.addEventListener('touchend', () => isDragging = false);
    </script>
</body>
</html>
